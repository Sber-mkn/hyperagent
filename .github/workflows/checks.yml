name: Checks
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Получить код
        uses: actions/checkout@v4

      - name: Установить python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/dev.txt
          
      - name: Проверить форматирование Ruff
        run: |
          ruff format --check .

      - name: Проверить код Ruff
        run: |
          ruff check .
