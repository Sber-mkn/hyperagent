services:
  db:
    image: postgres:15-alpine
    container_name: hyperagent_postgres
    restart: always
    environment:
      POSTGRES_DB: hyperagent_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 12345
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-database:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U admin -d hyperagent_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
  agent:
    build: ./agent
    container_name: hyperagent_agent
    restart: no
    volumes:
      - ./agent:/hyperagent/agent:rw
      - ./logs:/hyperagent/logs:rw
      - ./constitution:/hyperagent/constitution:ro
  supervisor:
    build: ./supervisor
    container_name: hyperagent_supervisor
    depends_on:
      db:
        condition: service_healthy
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_DB=hyperagent_db
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=12345
      - PYTHONUNBUFFERED=1
    volumes:
      - .:/hyperagent
      - /var/run/docker.sock:/var/run/docker.sock
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hyperagent_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
volumes:
  postgres_data:
  rabbitmq_data:
